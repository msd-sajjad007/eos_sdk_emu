name: Build

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-win64:
    name: Windows x64
    runs-on: windows-2022

    env:
      VCPKG_TRIPLET: x64-windows-static
      VCPKG_DISABLE_METRICS: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          # Use the vcpkg submodule if present, otherwise clone a known-good commit
          if (Test-Path ".\vcpkg\bootstrap-vcpkg.bat") {
            cd vcpkg
            # Fetch full history so baseline.json is reachable in git objects
            git fetch --unshallow 2>$null; git fetch origin 2>$null
            .\bootstrap-vcpkg.bat -disableMetrics
            cd ..
          } else {
            git clone https://github.com/microsoft/vcpkg.git vcpkg
            cd vcpkg
            # c82f746 is a recent commit that has versions/baseline.json
            git checkout c82f74667287d3dc386bce81e44964370c91a289
            .\bootstrap-vcpkg.bat -disableMetrics
            cd ..
          }

      - name: Cache vcpkg packages
        uses: actions/cache@v4
        id: vcpkg-cache
        with:
          path: vcpkg_installed
          key: vcpkg-win64-static-${{ hashFiles('vcpkg.json', 'vcpkg-configuration.json') }}

      - name: Install dependencies
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # Manifest mode: reads vcpkg.json, uses builtin-baseline for version resolution
          # No --classic flag needed or supported
          .\vcpkg\vcpkg.exe install `
            --triplet $env:VCPKG_TRIPLET `
            --x-install-root="${{ github.workspace }}\vcpkg_installed" `
            --no-print-usage

      - name: Install Ninja
        run: choco install ninja -y --no-progress
        shell: cmd

      - name: Configure CMake
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DX64=ON ^
            -DCMAKE_TOOLCHAIN_FILE="%GITHUB_WORKSPACE%/vcpkg/scripts/buildsystems/vcpkg.cmake" ^
            -DVCPKG_TARGET_TRIPLET=%VCPKG_TRIPLET% ^
            -DVCPKG_HOST_TRIPLET=%VCPKG_TRIPLET% ^
            -DVCPKG_INSTALLED_DIR="%GITHUB_WORKSPACE%/vcpkg_installed" ^
            -B build-win64

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build-win64 --config Release

      - name: Install
        shell: cmd
        run: cmake --install build-win64 --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: EOSSDK-Win64-Shipping
          path: release/win64/

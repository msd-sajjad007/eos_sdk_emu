name: Build EOS SDK Emulator (Windows)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: "clear"
  VCPKG_FEATURE_FLAGS: "-binarycaching"

jobs:

  # ----------------------------------------
  # Windows x64
  # ----------------------------------------
  build-windows-x64:
    name: "Windows x64"
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup vcpkg (latest)
        uses: lukka/run-vcpkg@v11
        with:
          # Latest stable vcpkg commit as of 2025 - fixes dead MSYS2 pkgconf URLs
          vcpkgGitCommitId: 'a34c873a9717a888f58dc05268dea15592c2f822'
          doNotCache: true

      - name: Install vcpkg deps (x64)
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT/vcpkg.exe" install `
            protobuf:x64-windows `
            abseil:x64-windows `
            --no-binarycaching

      - name: Setup MSVC x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Configure CMake (x64)
        shell: pwsh
        run: |
          cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DX64=ON `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -S . -B build/win64

      - name: Build (x64)
        shell: pwsh
        run: cmake --build build/win64 --config Release

      - name: Install (x64)
        shell: pwsh
        run: cmake --install build/win64 --config Release

      - name: Upload Windows x64
        uses: actions/upload-artifact@v4
        with:
          name: EOSSDK-Win64-Shipping
          path: release/win64/
          if-no-files-found: warn

  # ----------------------------------------
  # Windows x86
  # ----------------------------------------
  build-windows-x86:
    name: "Windows x86"
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup vcpkg (latest)
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: 'a34c873a9717a888f58dc05268dea15592c2f822'
          doNotCache: true

      - name: Install vcpkg deps (x86)
        shell: pwsh
        run: |
          & "$env:VCPKG_ROOT/vcpkg.exe" install `
            protobuf:x86-windows `
            abseil:x86-windows `
            --no-binarycaching

      - name: Setup MSVC x86
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_x86

      - name: Configure CMake (x86)
        shell: pwsh
        run: |
          cmake -G Ninja `
            -DCMAKE_BUILD_TYPE=Release `
            -DX86=ON `
            -DVCPKG_TARGET_TRIPLET=x86-windows `
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -S . -B build/win32

      - name: Build (x86)
        shell: pwsh
        run: cmake --build build/win32 --config Release

      - name: Install (x86)
        shell: pwsh
        run: cmake --install build/win32 --config Release

      - name: Upload Windows x86
        uses: actions/upload-artifact@v4
        with:
          name: EOSSDK-Win32-Shipping
          path: release/win32/
          if-no-files-found: warn

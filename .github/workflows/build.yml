name: Build Windows (x64 + x86)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

env:
  VCPKG_ROOT: C:\vcpkg

jobs:
  # ───────────────────────────────────────────────────────────
  # Windows x64  →  EOSSDK-Win64-Shipping.dll
  # ───────────────────────────────────────────────────────────
  build-win64:
    name: Windows x64
    runs-on: windows-2022

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install Ninja
        run: choco install ninja -y --no-progress
        shell: cmd

      - name: Update vcpkg
        run: |
          cd C:\vcpkg
          git pull --ff-only
          .\bootstrap-vcpkg.bat -disableMetrics
        shell: cmd

      - name: Install vcpkg dependencies (x64-windows-static)
        run: |
          C:\vcpkg\vcpkg.exe install protobuf abseil utf8-range nlohmann-json --triplet x64-windows-static --no-print-usage
        shell: cmd

      - name: Configure CMake (x64)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DX64=ON ^
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=x64-windows-static ^
            -B build-win64

      - name: Build (x64)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build-win64 --config Release

      - name: Install (x64)
        shell: cmd
        run: cmake --install build-win64 --config Release

      - name: Upload win64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: win64
          path: release/win64/

  # ───────────────────────────────────────────────────────────
  # Windows x86  →  EOSSDK-Win32-Shipping.dll
  # ───────────────────────────────────────────────────────────
  build-win32:
    name: Windows x86
    runs-on: windows-2022

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Install Ninja
        run: choco install ninja -y --no-progress
        shell: cmd

      - name: Update vcpkg
        run: |
          cd C:\vcpkg
          git pull --ff-only
          .\bootstrap-vcpkg.bat -disableMetrics
        shell: cmd

      - name: Install vcpkg dependencies (x86-windows-static)
        run: |
          C:\vcpkg\vcpkg.exe install protobuf abseil utf8-range nlohmann-json --triplet x86-windows-static --no-print-usage
        shell: cmd

      - name: Configure CMake (x86)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsx86_amd64.bat"
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DX86=ON ^
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=x86-windows-static ^
            -B build-win32

      - name: Build (x86)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvarsx86_amd64.bat"
          cmake --build build-win32 --config Release

      - name: Install (x86)
        shell: cmd
        run: cmake --install build-win32 --config Release

      - name: Upload win32 artifact
        uses: actions/upload-artifact@v4
        with:
          name: win32
          path: release/win32/

  # ───────────────────────────────────────────────────────────
  # Package: combine both DLLs into one zip
  # ───────────────────────────────────────────────────────────
  package:
    name: Package win64 + win32
    runs-on: windows-2022
    needs: [build-win64, build-win32]

    steps:
      - name: Download win64
        uses: actions/download-artifact@v4
        with:
          name: win64
          path: release/win64

      - name: Download win32
        uses: actions/download-artifact@v4
        with:
          name: win32
          path: release/win32

      - name: Zip combined package
        run: Compress-Archive -Path release\* -DestinationPath eos_sdk_emu_windows.zip
        shell: pwsh

      - name: Upload combined package
        uses: actions/upload-artifact@v4
        with:
          name: eos_sdk_emu_windows
          path: eos_sdk_emu_windows.zip

name: Build Windows x64

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-win64:
    name: Windows x64
    runs-on: windows-2022

    env:
      VCPKG_DIR: ${{ github.workspace }}\vcpkg
      VCPKG_TRIPLET: x64-windows-static
      VCPKG_DISABLE_METRICS: 1

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja
        run: choco install ninja -y --no-progress
        shell: cmd

      - name: Clone fresh vcpkg
        shell: cmd
        run: |
          git clone https://github.com/microsoft/vcpkg.git "%VCPKG_DIR%" --depth=1
          "%VCPKG_DIR%\bootstrap-vcpkg.bat" -disableMetrics

      - name: Install dependencies via fresh vcpkg
        shell: cmd
        run: |
          "%VCPKG_DIR%\vcpkg.exe" install protobuf abseil utf8-range nlohmann-json --triplet %VCPKG_TRIPLET% --no-print-usage

      - name: Configure CMake (x64)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DX64=ON ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_DIR%/scripts/buildsystems/vcpkg.cmake" ^
            -DVCPKG_TARGET_TRIPLET=%VCPKG_TRIPLET% ^
            -B build-win64

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build-win64 --config Release

      - name: Install DLL
        shell: cmd
        run: cmake --install build-win64 --config Release

      - name: Upload EOSSDK-Win64-Shipping.dll
        uses: actions/upload-artifact@v4
        with:
          name: EOSSDK-Win64-Shipping
          path: release/win64/

name: Build Windows x64

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-win64:
    name: Windows x64
    runs-on: windows-2022

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # ── Cache the entire vcpkg installed tree ──────────────────────────
      - name: Cache vcpkg packages
        uses: actions/cache@v4
        id: vcpkg-cache
        with:
          path: ${{ github.workspace }}\vcpkg_installed
          key: vcpkg-x64-windows-static-a34c873-${{ hashFiles('vcpkg.json') }}

      # ── Bootstrap vcpkg at pinned commit (always needed for toolchain) ─
      - name: Clone & bootstrap vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg --depth=1 --branch master
          Set-Location vcpkg
          git fetch --depth=1 origin a34c873a9717a888f58dc05268dea15592c2f822
          git checkout a34c873a9717a888f58dc05268dea15592c2f822
          .\bootstrap-vcpkg.bat -disableMetrics

      # ── Install deps (skipped on cache hit) ───────────────────────────
      - name: Install vcpkg dependencies
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        shell: pwsh
        env:
          VCPKG_DISABLE_METRICS: 1
        run: |
          $env:VCPKG_FEATURE_FLAGS = "-binarycaching,-compilertracking,-registries,-versions"
          .\vcpkg\vcpkg.exe install `
            protobuf abseil utf8-range nlohmann-json `
            --triplet x64-windows-static `
            --x-install-root="${{ github.workspace }}\vcpkg_installed" `
            --no-print-usage

      - name: Install Ninja
        shell: pwsh
        run: choco install ninja -y --no-progress

      - name: Configure CMake
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DX64=ON ^
            -DCMAKE_TOOLCHAIN_FILE="%GITHUB_WORKSPACE%/vcpkg/scripts/buildsystems/vcpkg.cmake" ^
            -DVCPKG_TARGET_TRIPLET=x64-windows-static ^
            -DVCPKG_HOST_TRIPLET=x64-windows-static ^
            -DVCPKG_INSTALLED_DIR="%GITHUB_WORKSPACE%/vcpkg_installed" ^
            -B build-win64

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build-win64 --config Release

      - name: Install DLL
        shell: cmd
        run: cmake --install build-win64 --config Release

      - name: Upload EOSSDK-Win64-Shipping.dll
        uses: actions/upload-artifact@v4
        with:
          name: EOSSDK-Win64-Shipping
          path: release/win64/

name: Build EOS SDK Emulator (Windows)

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:

  # ──────────────────────────────────────────────────────
  # Windows x64
  # ──────────────────────────────────────────────────────
  build-windows-x64:
    name: "Windows x64"
    runs-on: windows-2022

    steps:
      - name: Checkout (no submodule re-clone)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '01f602195983451bc83e72f4214af2cbc495aa94'

      - name: Install vcpkg deps (x64)
        shell: bash
        run: |
          "$VCPKG_ROOT/vcpkg" install \
            protobuf:x64-windows-static \
            nlohmann-json:x64-windows-static \
            zstd:x64-windows-static \
            abseil:x64-windows-static

      - name: Setup MSVC x64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Configure CMake (x64)
        shell: bash
        run: |
          cmake -G Ninja -Wno-dev \
            -DX64=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_TARGET_TRIPLET=x64-windows-static \
            "-DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -S . -B build/win64

      - name: Build (x64)
        shell: bash
        run: cmake --build build/win64

      - name: Install (x64)
        shell: bash
        run: cmake --install build/win64

      - name: Upload Windows x64 DLL
        uses: actions/upload-artifact@v4
        with:
          name: EOSSDK-Win64-Shipping
          path: release/
          if-no-files-found: warn

  # ──────────────────────────────────────────────────────
  # Windows x86
  # ──────────────────────────────────────────────────────
  build-windows-x86:
    name: "Windows x86"
    runs-on: windows-2022

    steps:
      - name: Checkout (no submodule re-clone)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '01f602195983451bc83e72f4214af2cbc495aa94'

      - name: Install vcpkg deps (x86)
        shell: bash
        run: |
          "$VCPKG_ROOT/vcpkg" install \
            protobuf:x86-windows-static \
            nlohmann-json:x86-windows-static \
            zstd:x86-windows-static \
            abseil:x86-windows-static

      - name: Setup MSVC x86
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64_x86

      - name: Configure CMake (x86)
        shell: bash
        run: |
          cmake -G Ninja -Wno-dev \
            -DX86=ON \
            -DCMAKE_BUILD_TYPE=Release \
            -DVCPKG_TARGET_TRIPLET=x86-windows-static \
            "-DCMAKE_TOOLCHAIN_FILE=$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -S . -B build/win32

      - name: Build (x86)
        shell: bash
        run: cmake --build build/win32

      - name: Install (x86)
        shell: bash
        run: cmake --install build/win32

      - name: Upload Windows x86 DLL
        uses: actions/upload-artifact@v4
        with:
          name: EOSSDK-Win32-Shipping
          path: release/
          if-no-files-found: warn

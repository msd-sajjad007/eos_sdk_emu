name: Build Windows x64

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-win64:
    name: Windows x64
    runs-on: windows-2022

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ninja
        run: choco install ninja -y --no-progress
        shell: cmd

      - name: Debug - show vcpkg paths
        shell: cmd
        run: |
          echo VCPKG_INSTALLATION_ROOT=%VCPKG_INSTALLATION_ROOT%
          dir C:\vcpkg\vcpkg.exe 2>nul && echo C:\vcpkg\vcpkg.exe EXISTS || echo C:\vcpkg\vcpkg.exe NOT FOUND

      - name: Install vcpkg dependencies into C:\vcpkg
        shell: cmd
        run: |
          C:\vcpkg\vcpkg.exe install protobuf abseil utf8-range nlohmann-json --triplet x64-windows-static --no-print-usage

      - name: Configure CMake (x64)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DX64=ON ^
            -DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake ^
            -DVCPKG_TARGET_TRIPLET=x64-windows-static ^
            -B build-win64

      - name: Build (x64)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build-win64 --config Release

      - name: Install output DLL
        shell: cmd
        run: cmake --install build-win64 --config Release

      - name: Upload EOSSDK-Win64-Shipping.dll
        uses: actions/upload-artifact@v4
        with:
          name: EOSSDK-Win64-Shipping
          path: release/win64/

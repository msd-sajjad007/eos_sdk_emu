name: Build Windows x64

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-win64:
    name: Windows x64
    runs-on: windows-2022

    env:
      VCPKG_ROOT: ${{ github.workspace }}/vcpkg
      VCPKG_DEFAULT_TRIPLET: x64-windows-static
      VCPKG_DEFAULT_HOST_TRIPLET: x64-windows-static
      VCPKG_DISABLE_METRICS: 1

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: c82f74667287d3dc386bce81e44964370c91a289
          runVcpkgInstall: true

      - name: Install Ninja
        run: choco install ninja -y --no-progress
        shell: cmd

      - name: Configure CMake (x64)
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DX64=ON ^
            -DCMAKE_TOOLCHAIN_FILE="%VCPKG_ROOT%/scripts/buildsystems/vcpkg.cmake" ^
            -DVCPKG_TARGET_TRIPLET=x64-windows-static ^
            -DVCPKG_HOST_TRIPLET=x64-windows-static ^
            -B build-win64

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build-win64 --config Release

      - name: Install DLL
        shell: cmd
        run: cmake --install build-win64 --config Release

      - name: Upload EOSSDK-Win64-Shipping.dll
        uses: actions/upload-artifact@v4
        with:
          name: EOSSDK-Win64-Shipping
          path: release/win64/

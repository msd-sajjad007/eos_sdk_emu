name: Build Windows x64

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-win64:
    name: Windows x64
    runs-on: windows-2022

    env:
      VCPKG_COMMIT: c82f74667287d3dc386bce81e44964370c91a289
      VCPKG_TRIPLET: x64-windows-static
      VCPKG_DISABLE_METRICS: 1
      # Disables pkgconfig post-build fixup that tries to download MSYS2 packages
      VCPKG_FEATURE_FLAGS: -binarycaching,-compilertracking
      # Skips the pkgconfig acquisition entirely
      VCPKG_KEEP_ENV_VARS: VCPKG_FEATURE_FLAGS

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        id: vcpkg-cache
        with:
          path: ${{ github.workspace }}\vcpkg_installed
          key: vcpkg-${{ env.VCPKG_TRIPLET }}-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json') }}

      - name: Clone & bootstrap vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          cd vcpkg
          git checkout $env:VCPKG_COMMIT
          .\bootstrap-vcpkg.bat -disableMetrics

      - name: Install vcpkg dependencies (classic mode, no version resolution)
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          # Classic mode: pass packages explicitly, bypasses manifest/baseline entirely
          # VCPKG_DISABLE_PKGCONFIG_FIXUP prevents the MSYS2 pkgconf download
          $env:VCPKG_DISABLE_PKGCONFIG_FIXUP = "1"
          $env:VCPKG_FEATURE_FLAGS = "-binarycaching,-compilertracking,-registries,-versions"
          .\vcpkg\vcpkg.exe install `
            protobuf:$env:VCPKG_TRIPLET `
            abseil:$env:VCPKG_TRIPLET `
            utf8-range:$env:VCPKG_TRIPLET `
            nlohmann-json:$env:VCPKG_TRIPLET `
            --classic `
            --x-install-root="${{ github.workspace }}\vcpkg_installed" `
            --no-print-usage

      - name: Install Ninja
        shell: cmd
        run: choco install ninja -y --no-progress

      - name: Configure CMake
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DX64=ON ^
            -DCMAKE_TOOLCHAIN_FILE="%GITHUB_WORKSPACE%/vcpkg/scripts/buildsystems/vcpkg.cmake" ^
            -DVCPKG_TARGET_TRIPLET=%VCPKG_TRIPLET% ^
            -DVCPKG_HOST_TRIPLET=%VCPKG_TRIPLET% ^
            -DVCPKG_INSTALLED_DIR="%GITHUB_WORKSPACE%/vcpkg_installed" ^
            -B build-win64

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build-win64 --config Release

      - name: Install DLL
        shell: cmd
        run: cmake --install build-win64 --config Release

      - name: Upload EOSSDK-Win64-Shipping.dll
        uses: actions/upload-artifact@v4
        with:
          name: EOSSDK-Win64-Shipping
          path: release/win64/

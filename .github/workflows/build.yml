name: Build Windows x64

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-win64:
    name: Windows x64
    runs-on: windows-2022

    env:
      VCPKG_COMMIT: a34c873a9717a888f58dc05268dea15592c2f822

    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache vcpkg installed packages
        uses: actions/cache@v4
        id: vcpkg-cache
        with:
          path: ${{ github.workspace }}\vcpkg_installed
          key: vcpkg-x64-static-${{ env.VCPKG_COMMIT }}-${{ hashFiles('vcpkg.json') }}

      - name: Clone vcpkg at pinned commit
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git vcpkg
          cd vcpkg
          git checkout $env:VCPKG_COMMIT
          .\bootstrap-vcpkg.bat -disableMetrics

      - name: Install vcpkg dependencies (manifest mode)
        if: steps.vcpkg-cache.outputs.cache-hit != 'true'
        shell: pwsh
        env:
          VCPKG_DISABLE_METRICS: 1
          VCPKG_FEATURE_FLAGS: -binarycaching
        run: |
          .\vcpkg\vcpkg.exe install `
            --triplet x64-windows-static `
            --x-install-root="${{ github.workspace }}\vcpkg_installed" `
            --no-print-usage

      - name: Install Ninja
        shell: cmd
        run: choco install ninja -y --no-progress

      - name: Configure CMake
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DX64=ON ^
            -DCMAKE_TOOLCHAIN_FILE="%GITHUB_WORKSPACE%/vcpkg/scripts/buildsystems/vcpkg.cmake" ^
            -DVCPKG_TARGET_TRIPLET=x64-windows-static ^
            -DVCPKG_HOST_TRIPLET=x64-windows-static ^
            -DVCPKG_INSTALLED_DIR="%GITHUB_WORKSPACE%/vcpkg_installed" ^
            -B build-win64

      - name: Build
        shell: cmd
        run: |
          call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          cmake --build build-win64 --config Release

      - name: Install DLL
        shell: cmd
        run: cmake --install build-win64 --config Release

      - name: Upload EOSSDK-Win64-Shipping.dll
        uses: actions/upload-artifact@v4
        with:
          name: EOSSDK-Win64-Shipping
          path: release/win64/
